apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextjs-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mattmcguin/nextjs-hello-world.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: nextjs-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
